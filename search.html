<style>
:root{
  --ink:#ede8dc; --ink-soft:#bdb7d2; --ink-faint:#8a85a6;
  --gold:#d4af6a; --gold-bright:#e7c885; --lapis:#9d8be0; --rose:#cf93a6;
  --panel:rgba(23,20,46,.78); --panel-2:rgba(33,28,64,.85);
  --line:rgba(190,180,230,.16); --line-2:rgba(190,180,230,.24);
  --disp:'Cinzel',Georgia,serif; --ui:'Inter','Noto Sans JP',system-ui,sans-serif;
  --cop:'Noto Sans Coptic','Antinoou',serif;
}
*{box-sizing:border-box}
html{background:#0a0918}
body{margin:0; color:var(--ink); font-family:var(--ui); line-height:1.6;
  -webkit-font-smoothing:antialiased}
a{color:inherit}
.cop{font-family:var(--cop)}

header{position:sticky; top:0; z-index:5; background:rgba(8,7,20,.92);
  backdrop-filter:blur(6px); border-bottom:1px solid rgba(212,175,106,.22);
  display:flex; align-items:center; gap:14px; padding:11px clamp(14px,4vw,40px)}
.brand{display:flex; align-items:center; gap:9px; text-decoration:none}
.brand img{border-radius:6px}
.brand .bt{display:flex; flex-direction:column; line-height:1.15}
.brand b{font-family:var(--disp); font-weight:500; font-size:1rem; letter-spacing:.05em}
.brand small{color:var(--ink-faint); font-size:.7rem; letter-spacing:.08em}
.spacer{flex:1}
.chip{font-size:.78rem; color:var(--ink); background:rgba(255,255,255,.06);
  border:1px solid var(--line-2); padding:7px 13px; border-radius:999px;
  text-decoration:none; white-space:nowrap}
.chip:hover{border-color:var(--gold); color:var(--gold-bright)}
button.chip{appearance:none; cursor:pointer; font-family:var(--ui)}

.wrap{position:relative; z-index:1; max-width:980px; margin:0 auto;
  padding:0 clamp(16px,4vw,40px) 80px}

.hero{padding:clamp(30px,6vw,58px) 0 8px; text-align:center}
.eyebrow{font-family:var(--disp); font-size:.74rem; letter-spacing:.32em;
  text-transform:uppercase; color:var(--gold)}
.hero h1{font-family:var(--disp); font-weight:500; letter-spacing:.08em;
  font-size:clamp(1.6rem,4vw,2.3rem); margin:.4em 0 .2em}
.hero .sub{color:var(--ink-faint); font-size:.9rem}

.doc-tabs{display:flex; justify-content:center; gap:8px; margin:20px 0 14px}
.doc-tab{font-family:var(--ui); font-size:.84rem; cursor:pointer; text-decoration:none;
  color:var(--ink-soft); background:var(--panel); border:1px solid var(--line);
  border-radius:999px; padding:8px 18px}
.doc-tab[aria-current="true"]{color:var(--gold-bright); border-color:var(--gold);
  background:rgba(212,175,106,.1)}
.doc-tab .cop{color:var(--gold); margin-right:.35em}

.searchbox{display:flex; gap:8px; margin:10px auto 0; max-width:640px}
.searchbox input{flex:1; font-family:var(--ui); font-size:1rem; color:var(--ink);
  background:var(--panel-2); border:1px solid var(--line-2); border-radius:10px;
  padding:12px 16px; outline:none}
.searchbox input:focus{border-color:var(--gold)}
.searchbox input::placeholder{color:var(--ink-faint)}
.fields{display:flex; flex-wrap:wrap; justify-content:center; gap:6px 16px;
  margin:12px 0 4px; font-size:.8rem; color:var(--ink-soft)}
.fields label{display:inline-flex; align-items:center; gap:6px; cursor:pointer}
.fields input{accent-color:#d4af6a}
.stats{ text-align:center; font-size:.76rem; color:var(--ink-faint); margin:8px 0 22px;
  font-variant-numeric:tabular-nums}
.stats b{color:var(--gold)}

.results{display:flex; flex-direction:column; gap:12px}
.hit{display:block; text-decoration:none; background:var(--panel);
  border:1px solid var(--line); border-radius:12px; padding:14px 18px;
  transition:border-color .15s, transform .15s}
.hit:hover{border-color:var(--gold); transform:translateY(-1px)}
.hit .meta{display:flex; align-items:baseline; gap:10px; font-size:.72rem;
  color:var(--ink-faint); margin-bottom:6px}
.hit .meta .no{font-family:var(--disp); color:var(--gold); letter-spacing:.08em}
.hit .meta .wit{border:1px solid var(--line); border-radius:999px; padding:1px 8px}
.hit .meta .go{margin-left:auto; color:var(--lapis)}
.hit .copline{font-family:var(--cop); font-size:1.14rem; line-height:1.9}
.hit .copline mark{background:rgba(212,175,106,.28); color:var(--gold-bright);
  border-radius:3px; padding:0 2px}
.hit .trline{font-size:.84rem; color:var(--ink-soft); margin-top:5px}
.hit .trline mark{background:rgba(157,139,224,.25); color:#cfc4f5;
  border-radius:3px; padding:0 2px}

.state{display:flex; flex-direction:column; align-items:center; gap:16px;
  text-align:center; padding:34px 0; color:var(--ink-faint); font-size:.9rem}
.state img{width:190px; border-radius:50%; border:1px solid rgba(212,175,106,.4);
  aspect-ratio:1; object-fit:cover; object-position:center 20%}
.state .cap{font-family:var(--disp); font-size:.7rem; letter-spacing:.28em;
  text-transform:uppercase; color:var(--gold)}
.notice{max-width:640px; margin:20px auto; background:var(--panel);
  border:1px solid var(--rose); border-radius:10px; padding:12px 16px;
  font-size:.82rem; color:var(--ink-soft)}
.notice code{color:var(--gold-bright)}

html[data-lang="en"] .l-ja{display:none}
html[data-lang="en"] .l-en{display:revert}

    ? "Corpus Search · " + DOC.en + " — Nag Hammadi Library"
    : "コーパス検索 · " + DOC.ja + " — ナグ・ハマディ写本コーパス";
  $("#docTitle").innerHTML = '<span class="cop">' + DOC.cop + '</span> ' + esc(docName(DOC));
  $("#docSub").textContent = DOC.siglum + (en ? " · search across text, lexicon and translations" : " · 本文・辞書・対訳を横断検索");
  const qi = $("#q");
  if(qi){
    qi.placeholder = en
      ? "Search Coptic, lemmas, glosses, translations (e.g. ⲛⲟⲩⲧⲉ / soul / 魂)"
      : "コプト語・レンマ・語釈・対訳を検索（例: ⲛⲟⲩⲧⲉ / soul / 魂）";
    qi.setAttribute("aria-label", en ? "Corpus search" : "コーパス検索");
  }
  $("#docTabs").innerHTML = Object.entries(DOCS).map(([k,d]) =>
    '<a class="doc-tab" aria-current="' + (k===docKey) + '" href="search.html?doc=' + k + '">' +
    '<span class="cop">' + d.cop + '</span>' + esc(docName(d)) + '</a>').join("");
  renderBaseStats();
  const q = $("#q").value.trim();
  if(ready){ q ? run(q) : idleState(); }
}
{ const lgb = $("#langBtn"); if(lgb) lgb.onclick = () => {
    H.setAttribute("data-lang", UL()==="en" ? "ja" : "en");
    applyUILang();
  }; }

/* ---------- 読み込み ---------- */
async function fetchXML(url){
  const r = await fetch(url, {cache:"no-store"});
  if(!r.ok) throw new Error(url + " → HTTP " + r.status);
  const x = new DOMParser().parseFromString(await r.text(), "application/xml");
  if(x.querySelector("parsererror")) throw new Error(url + (UL()==="en" ? " → XML not well-formed" : " → XML整形式エラー"));
  return x;
}
function T(node, name){ return Array.from(node.getElementsByTagNameNS(TEI, name)); }

function parseLex(xml){
  T(xml, "entry").forEach(e => {
    const orth = T(e, "orth")[0]; if(!orth) return;
    const lemma = orth.textContent.trim();
    const pos = (T(e, "pos")[0] || {}).textContent || "";
    const senses = { pos, ja:[], en:[], fr:[] };
    T(e, "quote").forEach(q => {
      const l = q.parentElement.getAttribute("xml:lang");
      if(senses[l]) senses[l].push(q.textContent.trim());
    });
    (LEX[lemma] = LEX[lemma] || []).push(senses);
  });
}
function witnessOf(el){
  for(let p = el.parentElement; p; p = p.parentElement){
    if(p.localName === "text" && p.getAttribute("n")) return p.getAttribute("n");
  }
  return "";
}
function parseTEI(xml){
  T(xml, "s").forEach(s => {
    const id = s.getAttribute("xml:id"); if(!id) return;
    const words = T(s, "w").map(w => ({
      form: w.textContent.trim(),
      lemma: w.getAttribute("lemma") || "",
      gloss: w.getAttribute("gloss") || ""
    }));
    SEGS.push({
      id, n: s.getAttribute("n") || "",
      wit: witnessOf(s),
      words,
      ja: s.getAttribute("transJa") || "",
      en: s.getAttribute("transEn") || "",
      fr: s.getAttribute("transFr") || ""
    });
  });
}
function renderBaseStats(){
  if(!ready) return;
  const q = $("#q").value.trim();
  if(q) return; // 検索中は run() が統計行を描画
  const tokens = SEGS.reduce((a,s)=>a+s.words.length, 0);
  $("#stats").innerHTML = UL()==="en"
    ? "Segments <b>" + SEGS.length + "</b> · tokens <b>" + tokens.toLocaleString() +
      "</b> · lexicon lemmas <b>" + Object.keys(LEX).length.toLocaleString() + "</b>"
    : "セグメント <b>" + SEGS.length + "</b> · トークン <b>" + tokens.toLocaleString() +
      "</b> · 辞書レンマ <b>" + Object.keys(LEX).length.toLocaleString() + "</b>";
}
async function load(){
  try{
    const [tei, lex] = await Promise.all([fetchXML(DOC.tei), fetchXML(DOC.lex)]);
    parseTEI(tei); parseLex(lex);
    ready = true;
    renderBaseStats();
    idleState();
    const q0 = new URLSearchParams(location.search).get("q");
    if(q0){ $("#q").value = q0; run(q0); }
  }catch(e){
    const w = $("#loadwarn"); w.hidden = false;
    w.innerHTML = UL()==="en"
      ? "⬥ <b>Could not load the data.</b> Serve <code>" + esc(DOC.tei) + "</code> and <code>" + esc(DOC.lex) +
        "</code> via a web server (file:// will not work).<br><small>" + esc(e.message) + "</small>"
      : "⬥ <b>データを取得できませんでした。</b> <code>" + esc(DOC.tei) +
        "</code> と <code>" + esc(DOC.lex) + "</code> をWebサーバ経由で配信してください（file:// では取得不可）。<br>" +
        "<small>" + esc(e.message) + "</small>";
  }
}

/* ---------- 検索 ---------- */
function whereLbl(key){
  const en = UL()==="en";
  return ({
    form:  en ? "Form"      : "語形",
    lemma: en ? "Lemma"     : "レンマ",
    gloss: en ? "Gloss"     : "語釈",
    ja:    en ? "JA trans." : "和訳",
    en:    en ? "EN trans." : "英訳",
    fr:    en ? "FR trans." : "仏訳"
  })[key];
}
function glossesOf(w){
  const out = w.gloss ? [w.gloss] : [];
  (LEX[w.lemma] || []).forEach(s => out.push(...s.ja, ...s.en, ...s.fr));
  return out;
}
function markCop(words, qn){
  return words.map(w => {
    const hit = ($("#fForm").checked && norm(w.form).includes(qn)) ||
                ($("#fLemma").checked && norm(w.lemma).includes(qn));
    return hit ? "<mark>" + esc(w.form) + "</mark>" : esc(w.form);
  }).join(" ");
}
function markText(t, q){
  const i = t.toLowerCase().indexOf(q.toLowerCase());
  if(i < 0) return esc(t);
  return esc(t.slice(0,i)) + "<mark>" + esc(t.slice(i, i+q.length)) + "</mark>" + esc(t.slice(i+q.length));
}
function run(q){
  if(!ready) return;
  q = q.trim();
  const res = $("#results");
  if(!q){ renderBaseStats(); idleState(); return; }
  const en = UL()==="en";
  const qn = norm(q), ql = q.toLowerCase();
  const hits = [];
  SEGS.forEach(s => {
    const where = [];
    if($("#fForm").checked  && s.words.some(w => norm(w.form).includes(qn))) where.push(whereLbl("form"));
    if($("#fLemma").checked && s.words.some(w => norm(w.lemma).includes(qn))) where.push(whereLbl("lemma"));
    if($("#fGloss").checked && s.words.some(w => glossesOf(w).some(g => g.toLowerCase().includes(ql)))) where.push(whereLbl("gloss"));
    if($("#fTrans").checked){
      if(s.ja.includes(q)) where.push(whereLbl("ja"));
      if(s.en.toLowerCase().includes(ql)) where.push(whereLbl("en"));
      if(s.fr.toLowerCase().includes(ql)) where.push(whereLbl("fr"));
    }
    if(where.length) hits.push({s, where});
  });
  $("#stats").innerHTML = en
    ? "\u201C<b>" + esc(q) + "</b>\u201D — <b>" + hits.length + "</b> segment" + (hits.length===1?"":"s") + " match"
    : "「<b>" + esc(q) + "</b>」 — <b>" + hits.length + "</b> セグメントが一致";
  if(!hits.length){
    res.innerHTML = en
      ? '<div class="state"><div>No matches for \u201C' + esc(q) + '\u201D.' +
        '<br><small>Combining marks (supralinear strokes etc.) are ignored in matching.</small></div></div>'
      : '<div class="state"><div>「' + esc(q) + '」に一致する箇所はありません。' +
        '<br><small>上線などの合成記号は無視して照合しています。</small></div></div>';
    return;
  }
  res.innerHTML = hits.map(({s, where}) => {
    const tr = s.ja || s.en || s.fr;
    const trHTML = tr ? '<div class="trline">' +
      (s.ja.includes(q) || s.en.toLowerCase().includes(ql) || s.fr.toLowerCase().includes(ql)
        ? markText(tr, q) : esc(tr)) + "</div>" : "";
    return '<a class="hit" href="' + DOC.reader + '#seg-' + esc(s.id) + '">' +
      '<div class="meta"><span class="no">§' + esc(s.n) + '</span>' +
      (s.wit ? '<span class="wit">' + esc(s.wit) + '</span>' : "") +
      '<span>' + where.join(" · ") + '</span>' +
      '<span class="go">' + (en ? "To text →" : "本文へ →") + '</span></div>' +
      '<div class="copline">' + markCop(s.words, qn) + '</div>' + trHTML + '</a>';
  }).join("");
}
function idleState(){
  const en = UL()==="en";
  $("#results").innerHTML =
    '<div class="state">' +
    '<img src="' + DOC.guide + '" alt="" loading="lazy">' +
    '<div><div class="cap">' + esc(DOC.guideName) + '</div>' +
    (en
      ? 'Type a query to search across Coptic forms, lemmas, glosses and translations.<br>' +
        'Click a result to jump to the segment in the full-text viewer.</div></div>'
      : '検索語を入力すると、コプト語形・レンマ・語釈・対訳を横断して該当セグメントを一覧します。<br>' +
        '結果をクリックすると全文表示の該当箇所へ移動します。</div></div>');
}

let qt = null;
$("#q").addEventListener("input", e => { clearTimeout(qt); qt = setTimeout(() => run(e.target.value), 180); });
["fForm","fLemma","fGloss","fTrans"].forEach(id =>
  $("#"+id).addEventListener("change", () => run($("#q").value)));
applyUILang();
load();
</script>
